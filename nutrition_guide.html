<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri's Nutrition Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1310;
    --bg-grad: radial-gradient(ellipse at top, #16201A 0%, #0E1310 60%);
    --surface: #161C18;
    --surface-2: #1E2620;
    --surface-3: #283129;
    --border: rgba(232, 237, 220, 0.08);
    --border-strong: rgba(232, 237, 220, 0.16);
    --text: #EDEAE0;
    --text-muted: #8E9A91;
    --text-dim: #5E6862;
    --accent: #E8A03E;
    --accent-dim: rgba(232, 160, 62, 0.15);
    --cal: #E0625E;
    --cal-dim: rgba(224, 98, 94, 0.18);
    --pro: #E8A03E;
    --pro-dim: rgba(232, 160, 62, 0.18);
    --fib: #7CB47A;
    --fib-dim: rgba(124, 180, 122, 0.18);
    --water: #6FAFC4;
    --gold: #D4AF6A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    background-image: var(--bg-grad);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ============ LOADING & ERROR STATES ============ */
  .app-status {
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .app-status .pulse {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .app-status .error-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--cal);
  }
  .app-status .error-body {
    color: var(--text-muted);
    max-width: 56ch;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .app-status code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
  }

  /* ============ HEADER ============ */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 48px;
    align-items: end;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-left .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-left .eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 64px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .header-left h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--gold);
  }
  .header-left p {
    color: var(--text-muted);
    max-width: 52ch;
    font-size: 15px;
  }
  .targets {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    min-width: 280px;
  }
  .targets-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .target-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .target-row:first-of-type { border-top: none; padding-top: 0; }
  .target-row .name { color: var(--text-muted); }
  .target-row .value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .target-row .value.pro { color: var(--pro); }
  .target-row .value.fib { color: var(--fib); }
  .target-row .value.water { color: var(--water); }

  /* ============ GOALS BAND ============ */
  .goals-band {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 40px;
  }
  .goal-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: rgba(255,255,255,0.015);
  }
  .goal-chip .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 8px;
    vertical-align: middle;
  }

  /* ============ TABS ============ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 16px 20px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tab .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab.active .num { color: var(--accent); }

  /* ============ TOOLBAR ============ */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .toolbar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-right: 4px;
  }
  .sort-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .pill:hover { color: var(--text); border-color: var(--text-muted); }
  .pill.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .search-input {
    margin-left: auto;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    width: 180px;
    outline: none;
    transition: border-color 0.18s ease, width 0.25s ease;
  }
  .search-input:focus { border-color: var(--accent); width: 220px; }
  .search-input::placeholder { color: var(--text-dim); }

  /* ============ PANEL ============ */
  .panel { display: none; animation: panelFade 0.4s ease both; }
  .panel.active { display: block; }
  @keyframes panelFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel-intro {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-bottom: 28px;
    align-items: start;
  }
  .panel-intro h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .panel-intro h2 em { font-style: italic; color: var(--gold); }
  .panel-intro p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ============ FOOD GRID ============ */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }
  .food-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px 16px;
    position: relative;
    transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    opacity: 0;
    animation: cardIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
  }
  .food-card:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .food-card.champion::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--gold));
    border-radius: 6px 0 0 6px;
  }
  .food-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .food-name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: -0.005em;
  }
  .food-serv {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }
  .freq-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .freq-badge.daily      { color: var(--fib);    border-color: rgba(124, 180, 122, 0.35); }
  .freq-badge.weekly     { color: var(--accent); border-color: rgba(232, 160, 62, 0.35); }
  .freq-badge.occasional { color: var(--cal);    border-color: rgba(224, 98, 94, 0.35); }
  .champion-mark {
    position: absolute;
    top: 14px;
    right: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gold);
  }
  .metrics { display: flex; flex-direction: column; gap: 7px; }
  .metric {
    display: grid;
    grid-template-columns: 56px 1fr 64px;
    align-items: center;
    gap: 12px;
  }
  .metric-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .bar-track {
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    width: 0;
    border-radius: 100px;
    transition: width 1.1s cubic-bezier(0.2, 0.7, 0.2, 1);
    position: relative;
  }
  .bar-fill.cal { background: linear-gradient(90deg, var(--cal-dim), var(--cal)); }
  .bar-fill.pro { background: linear-gradient(90deg, var(--pro-dim), var(--pro)); }
  .bar-fill.fib { background: linear-gradient(90deg, var(--fib-dim), var(--fib)); }
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    height: 100%;
    width: 30px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: translateX(30px);
    opacity: 0;
  }
  .food-card.in-view .bar-fill::after { animation: glint 1.6s ease-out 0.3s; }
  @keyframes glint {
    0%   { opacity: 0; transform: translateX(-50px); }
    50%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(0); }
  }
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    color: var(--text);
  }
  .metric-value .pct { font-size: 10px; color: var(--text-dim); margin-left: 4px; }

  /* ============ PRIORITY PANEL ============ */
  .priority-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .priority-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
  }
  .priority-card h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    margin-bottom: 4px;
    letter-spacing: -0.005em;
  }
  .priority-card h3 em { font-style: italic; color: var(--gold); }
  .priority-card .freq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .priority-card .sublist { margin-bottom: 16px; }
  .priority-card .sublist:last-child { margin-bottom: 0; }
  .priority-card .sublabel {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .priority-card ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .priority-card li {
    font-size: 13px;
    color: var(--text);
    padding: 4px 10px;
    background: var(--surface-2);
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: all 0.15s ease;
  }
  .priority-card li:hover { border-color: var(--accent); color: var(--accent); }

  /* CHAMPIONS */
  .champions {
    margin-top: 32px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .champions-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .champ-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .champ-col h4 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .champ-col h4 .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .champ-col h4.cal .swatch { background: var(--cal); }
  .champ-col h4.pro .swatch { background: var(--pro); }
  .champ-col h4.fib .swatch { background: var(--fib); }
  .champ-col ol { list-style: none; counter-reset: champ; }
  .champ-col li {
    counter-increment: champ;
    font-size: 13px;
    color: var(--text);
    padding: 6px 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .champ-col li::before {
    content: counter(champ, decimal-leading-zero);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }
  .champ-col li:first-child { border-top: none; }
  .champ-col li .val {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* ============ FOOTER ============ */
  .footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 860px) {
    .page { padding: 32px 20px 60px; }
    .header { grid-template-columns: 1fr; gap: 24px; }
    .targets { min-width: 0; }
    .panel-intro { grid-template-columns: 1fr; gap: 16px; }
    .panel-intro h2 { font-size: 26px; }
    .champ-grid { grid-template-columns: 1fr; gap: 16px; }
    .food-grid { grid-template-columns: 1fr; }
    .search-input { width: 100%; margin-left: 0; margin-top: 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="page" id="app">
  <div class="app-status" id="status">
    <div class="pulse">Loading nutrition data…</div>
  </div>
</div>

<script>
/* ==========================================================================
   PRESENTATION LAYER
   All content is rendered from nutrition_data.json (loaded on init).
   The HTML/CSS above is the shell; this script builds the UI from data.
   ========================================================================== */

const DATA_URL = 'nutrition_data.json';

/* ============ STATE ============ */
const state = {
  data: null,
  activeTab: null,
  activeSort: 'default',
  searchTerm: ''
};

/* ============ DOM HELPERS ============ */
const $ = sel => document.querySelector(sel);

function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      const v = attrs[k];
      if (k === 'class')        node.className = v;
      else if (k === 'dataset') Object.assign(node.dataset, v);
      else if (k === 'html')    node.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
      else                      node.setAttribute(k, v);
    }
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])
);

/* ============ DATA LOAD ============ */
async function loadData() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' – ' + res.statusText);
    state.data = await res.json();
    state.activeTab = state.data.tabs[0].key;
    renderApp();
  } catch (err) {
    renderError(err);
  }
}

function renderError(err) {
  const status = $('#status');
  const isFileProto = location.protocol === 'file:';
  status.innerHTML = '';
  status.append(
    el('div', { class: 'error-title' }, 'Could not load nutrition_data.json'),
    el('div', { class: 'error-body' },
      isFileProto
        ? 'Browsers block fetch() on file:// URLs. Serve the folder with a local web server, then reload.'
        : ('Reason: ' + err.message + '. Make sure nutrition_data.json sits next to this HTML file.')
    )
  );
  if (isFileProto) {
    status.append(
      el('div', { class: 'error-body' },
        'From this folder, run: ',
        el('code', null, 'python3 -m http.server 8000'),
        ' — then open ',
        el('code', null, 'http://localhost:8000')
      )
    );
  }
}

/* ============ TOP-LEVEL RENDER ============ */
function renderApp() {
  document.title = state.data.meta.title;
  const app = $('#app');
  app.innerHTML = '';
  app.append(
    renderHeader(),
    renderGoalsBand(),
    renderTabs(),
    renderToolbar(),
    ...renderPanels(),
    renderFooter()
  );
  attachEvents();
  showTab(state.activeTab);
}

/* ============ HEADER ============ */
function renderHeader() {
  const { header, dailyTargets } = state.data;

  const targets = el('aside', { class: 'targets' },
    el('div', { class: 'targets-label' }, 'Daily targets'),
    ...dailyTargets.map(t =>
      el('div', { class: 'target-row' },
        el('span', { class: 'name' }, t.name),
        el('span', { class: 'value ' + (t.tone || '') }, t.value)
      )
    )
  );

  return el('header', { class: 'header' },
    el('div', { class: 'header-left' },
      el('div', { class: 'eyebrow' }, header.eyebrow),
      el('h1', { html: escapeHtml(header.titleLine1) + '<br><em>' + escapeHtml(header.titleLine2) + '</em>' }),
      el('p', null, header.description)
    ),
    targets
  );
}

/* ============ GOALS BAND ============ */
function renderGoalsBand() {
  const band = el('div', { class: 'goals-band' });
  state.data.goals.forEach(g => {
    band.append(el('span', { class: 'goal-chip', html: '<span class="dot"></span>' + escapeHtml(g) }));
  });
  return band;
}

/* ============ TABS ============ */
function renderTabs() {
  const nav = el('nav', { class: 'tabs', id: 'tabs' });
  state.data.tabs.forEach(t => {
    nav.append(
      el('button', { class: 'tab', dataset: { tab: t.key } },
        el('span', { class: 'num' }, t.num),
        t.label
      )
    );
  });
  return nav;
}

/* ============ TOOLBAR ============ */
function renderToolbar() {
  const bar = el('div', { class: 'toolbar', id: 'toolbar' },
    el('span', { class: 'toolbar-label' }, 'Sort by')
  );
  const group = el('div', { class: 'sort-group', id: 'sort-group' });
  state.data.sortOptions.forEach(opt => {
    group.append(el('button', {
      class: 'pill' + (opt.key === state.activeSort ? ' active' : ''),
      dataset: { sort: opt.key }
    }, opt.label));
  });
  bar.append(group);
  bar.append(el('input', {
    type: 'text', class: 'search-input', id: 'search', placeholder: 'Search foods…'
  }));
  return bar;
}

/* ============ PANELS ============ */
function renderPanels() {
  return state.data.tabs.map(tab => {
    const section = state.data.sections[tab.key];
    const panel = el('section', { class: 'panel', id: 'panel-' + tab.key });

    panel.append(
      el('div', { class: 'panel-intro' },
        el('h2', { html: escapeHtml(section.title) + ' <em>' + escapeHtml(section.titleEm) + '</em>' }),
        el('p', null, section.intro)
      )
    );

    if (tab.key === 'pri') {
      panel.append(renderPriorityGrid());
    } else {
      panel.append(
        el('div', { class: 'food-grid', id: 'grid-' + tab.key }),
        el('div', { class: 'champions', id: 'champ-' + tab.key })
      );
    }
    return panel;
  });
}

/* ============ PRIORITY GRID ============ */
function renderPriorityGrid() {
  const grid = el('div', { class: 'priority-grid' });
  state.data.priorityGuide.forEach(card => {
    const node = el('div', { class: 'priority-card' },
      el('h3', { html: escapeHtml(card.title) + ' <em>' + escapeHtml(card.titleEm) + '</em>' }),
      el('div', { class: 'freq' }, card.freq)
    );
    card.groups.forEach(group => {
      const sub = el('div', { class: 'sublist' });
      if (group.label) sub.append(el('div', { class: 'sublabel' }, group.label));
      const ul = el('ul');
      group.items.forEach(i => ul.append(el('li', null, i)));
      sub.append(ul);
      node.append(sub);
    });
    grid.append(node);
  });
  return grid;
}

/* ============ FOOD GRID ============ */
function renderGrid(tabKey) {
  const grid = $('#grid-' + tabKey);
  if (!grid) return;
  const { scales, freqLabels } = state.data;
  let items = state.data.sections[tabKey].items.slice();

  if (state.searchTerm) {
    const q = state.searchTerm.toLowerCase();
    items = items.filter(it => it.name.toLowerCase().includes(q));
  }
  if (state.activeSort === 'protein')  items.sort((a, b) => b.pro - a.pro);
  if (state.activeSort === 'fiber')    items.sort((a, b) => b.fib - a.fib);
  if (state.activeSort === 'calories') items.sort((a, b) => a.cal - b.cal);

  grid.innerHTML = '';
  items.forEach((item, i) => {
    const calPct = Math.min(100, (item.cal / scales.cal) * 100);
    const proPct = Math.min(100, (item.pro / scales.pro) * 100);
    const fibPct = Math.min(100, (item.fib / scales.fib) * 100);

    const card = document.createElement('article');
    card.className = 'food-card' + (item.champion ? ' champion' : '');
    card.style.animationDelay = Math.min(i * 25, 600) + 'ms';
    card.innerHTML =
      (item.champion ? '<span class="champion-mark">★</span>' : '') +
      '<div class="food-head">' +
        '<div>' +
          '<div class="food-name">' + escapeHtml(item.name) + '</div>' +
          '<div class="food-serv">' + escapeHtml(item.serving) + '</div>' +
        '</div>' +
        '<span class="freq-badge ' + item.freq + '">' + (freqLabels[item.freq] || item.freq) + '</span>' +
      '</div>' +
      '<div class="metrics">' +
        '<div class="metric">' +
          '<span class="metric-label">kcal</span>' +
          '<div class="bar-track"><div class="bar-fill cal" data-target="' + calPct + '"></div></div>' +
          '<span class="metric-value">' + item.cal + '</span>' +
        '</div>' +
        '<div class="metric">' +
          '<span class="metric-label">protein</span>' +
          '<div class="bar-track"><div class="bar-fill pro" data-target="' + proPct + '"></div></div>' +
          '<span class="metric-value">' + item.pro + 'g<span class="pct"> ' + Math.round(proPct) + '%</span></span>' +
        '</div>' +
        '<div class="metric">' +
          '<span class="metric-label">fiber</span>' +
          '<div class="bar-track"><div class="bar-fill fib" data-target="' + fibPct + '"></div></div>' +
          '<span class="metric-value">' + item.fib + 'g<span class="pct"> ' + Math.round(fibPct) + '%</span></span>' +
        '</div>' +
      '</div>';
    grid.append(card);
  });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    grid.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.target + '%');
    grid.querySelectorAll('.food-card').forEach(c => c.classList.add('in-view'));
  }));
}

/* ============ CHAMPIONS ============ */
function renderChampions(tabKey) {
  const wrap = $('#champ-' + tabKey);
  if (!wrap) return;
  const section = state.data.sections[tabKey];
  const labels = section.championLabels;
  const items = section.items;

  const topPro = items.slice().sort((a, b) => b.pro - a.pro).slice(0, 5);
  const topFib = items.slice().sort((a, b) => b.fib - a.fib).slice(0, 5);
  const topCal = items.slice().sort((a, b) => a.cal - b.cal).slice(0, 5);

  const col = (klass, title, list, unitFn) =>
    '<div class="champ-col">' +
      '<h4 class="' + klass + '"><span class="swatch"></span>' + escapeHtml(title) + '</h4>' +
      '<ol>' + list.map(i =>
        '<li>' + escapeHtml(i.name) + '<span class="val">' + unitFn(i) + '</span></li>'
      ).join('') + '</ol>' +
    '</div>';

  wrap.innerHTML =
    '<div class="champions-title">Top 5 — by metric</div>' +
    '<div class="champ-grid">' +
      col('pro', labels.pro, topPro, i => i.pro + 'g') +
      col('fib', labels.fib, topFib, i => i.fib + 'g') +
      col('cal', labels.cal, topCal, i => i.cal + ' kcal') +
    '</div>';
}

/* ============ FOOTER ============ */
function renderFooter() {
  const m = state.data.meta;
  return el('footer', { class: 'footer' },
    el('div', null, m.footerLeft),
    el('div', null, m.footerRight)
  );
}

/* ============ TAB / SORT / SEARCH ============ */
function showTab(tabKey) {
  state.activeTab = tabKey;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabKey));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabKey));

  $('#toolbar').style.display = (tabKey === 'pri') ? 'none' : 'flex';
  if (tabKey !== 'pri') {
    renderGrid(tabKey);
    renderChampions(tabKey);
  }
}

function attachEvents() {
  $('#tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (btn) showTab(btn.dataset.tab);
  });
  $('#sort-group').addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    document.querySelectorAll('#sort-group .pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    state.activeSort = btn.dataset.sort;
    if (state.activeTab !== 'pri') renderGrid(state.activeTab);
  });
  $('#search').addEventListener('input', e => {
    state.searchTerm = e.target.value.trim();
    if (state.activeTab !== 'pri') renderGrid(state.activeTab);
  });
}

/* ============ INIT ============ */
loadData();
</script>
</body>
</html>
